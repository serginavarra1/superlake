name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.set.outputs.api }}
      web: ${{ steps.set.outputs.web }}
      agent: ${{ steps.set.outputs.agent }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        if: github.event_name == 'push'
        id: filter
        with:
          filters: |
            shared: &shared
              - 'packages/**'
              - 'pnpm-lock.yaml'
            api:
              - *shared
              - 'apps/api/**'
            web:
              - *shared
              - 'apps/web/**'
            agent:
              - *shared
              - 'apps/agent/**'

      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true"   >> "$GITHUB_OUTPUT"
            echo "web=true"   >> "$GITHUB_OUTPUT"
            echo "agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=${{ steps.filter.outputs.api }}"     >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filter.outputs.web }}"     >> "$GITHUB_OUTPUT"
            echo "agent=${{ steps.filter.outputs.agent }}" >> "$GITHUB_OUTPUT"
          fi

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile -t "$REGISTRY/superlake-api:latest" .
          docker push "$REGISTRY/superlake-api:latest"

  build-agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Agent image
        run: |
          docker build -f apps/agent/Dockerfile -t "$REGISTRY/superlake-agent:latest" .
          docker push "$REGISTRY/superlake-agent:latest"

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Web image
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" \
            --build-arg VITE_API_URL="${{ vars.VITE_API_URL }}" \
            --build-arg VITE_MASTRA_API_URL="${{ vars.VITE_MASTRA_API_URL }}" \
            -t "$REGISTRY/superlake-web:latest" .
          docker push "$REGISTRY/superlake-web:latest"

  migrate:
    needs: [changes, build-api]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Point migrate job at the new image
        run: |
          gcloud run jobs update superlake-api-migrate \
            --image="$REGISTRY/superlake-api:latest" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT_ID"

      - name: Run Prisma migrations
        run: |
          gcloud run jobs execute superlake-api-migrate \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT_ID" \
            --wait

  deploy-api:
    needs: [changes, migrate]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Roll API to new image
        run: |
          gcloud run services update superlake-api \
            --image="$REGISTRY/superlake-api:latest" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT_ID"

  deploy-agent:
    needs: [changes, build-agent]
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Roll Agent to new image
        run: |
          gcloud run services update superlake-agent \
            --image="$REGISTRY/superlake-agent:latest" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT_ID"

  deploy-web:
    needs: [changes, build-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Roll Web to new image
        run: |
          gcloud run services update superlake-web \
            --image="$REGISTRY/superlake-web:latest" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT_ID"
